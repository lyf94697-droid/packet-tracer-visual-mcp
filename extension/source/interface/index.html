<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>PT Visual MCP</title>
  <style>
    body {
      margin: 0;
      font-family: Segoe UI, Arial, sans-serif;
      background: #101318;
      color: #e8edf3;
    }
    .top {
      padding: 18px 20px;
      border-bottom: 1px solid #2b3340;
      background: #161b22;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 650;
    }
    .meta {
      display: flex;
      gap: 16px;
      align-items: center;
      color: #aab6c4;
      font-size: 13px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 7px;
      background: #6b7280;
    }
    .dot.ok { background: #20c997; }
    .dot.bad { background: #ff6b6b; }
    .dot.waiting { background: #f7c948; }
    .panel {
      padding: 16px 20px;
    }
    .box {
      border: 1px solid #2b3340;
      background: #0b0f14;
      height: 260px;
      overflow: auto;
      padding: 10px 12px;
      font-family: Consolas, monospace;
      font-size: 12px;
    }
    .line {
      white-space: pre-wrap;
      margin: 0 0 4px;
    }
    .line.ok { color: #8ce99a; }
    .line.warn { color: #ffd43b; }
    .line.bad { color: #ff8787; }
    .time { color: #748094; }
    code {
      color: #9cdcfe;
    }
  </style>
</head>
<body>
  <div class="top">
    <h1>PT Visual MCP</h1>
    <div class="meta">
      <span><span id="statusDot" class="dot waiting"></span><span id="statusText">starting</span></span>
      <span>handled: <strong id="counter">0</strong></span>
      <span><code id="url"></code></span>
    </div>
  </div>
  <div class="panel">
    <div class="box" id="log"></div>
  </div>
  <script src="bridge.js"></script>
</body>
</html>
