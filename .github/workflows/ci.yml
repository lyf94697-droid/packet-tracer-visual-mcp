name: ci

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install package
        run: python -m pip install -e .

      - name: Python compile check
        run: python -m compileall src scripts

      - name: Project self-check
        run: python scripts\check_project.py

      - name: Packet Tracer extension syntax check
        run: |
          python scripts\build_script_engine.py
          node --check extension\source\pt_api.js
          node --check extension\source\interface\bridge.js
          node --check extension\packet-tracer-visual-mcp-script-engine.js
